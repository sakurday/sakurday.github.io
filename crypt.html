<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密解密工具by Gemini & Sakurday</title>
    <style>
        :root {
            /* 浅色模式颜色变量 */
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #e4e7ed;
            --primary-color: #409eff;
            --primary-hover: #66b1ff;
            --success-color: #67c23a;
            --error-color: #f56c6c;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* 深色模式颜色变量 */
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #e5eaf3;
                --text-secondary: #a3a6ad;
                --border-color: #363637;
                --primary-color: #409eff;
                --primary-hover: #337ecc;
                --success-color: #67c23a;
                --error-color: #f56c6c;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            font-size: 14px;
            color: var(--text-secondary);
            padding: 8px;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            background-color: transparent;
            cursor: pointer;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: transparent;
            color: var(--text-main);
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        .radio-group input {
            margin-right: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
            word-break: break-all;
        }

        .success { color: var(--success-color); }
        .error { color: var(--error-color); }
        .info { color: var(--text-secondary); }
    </style>
</head>
<body>

<div class="container">
    <h1>文件加密/解密</h1>
    
    <div class="form-group">
        <label for="fileInput">选择文件</label>
        <input type="file" id="fileInput">
    </div>

    <div class="form-group">
        <label>操作类型</label>
        <div class="radio-group">
            <label><input type="radio" name="mode" value="encrypt" checked> 加密文件</label>
            <label><input type="radio" name="mode" value="decrypt"> 解密文件</label>
        </div>
    </div>

    <div class="form-group">
        <label for="password">密码 (选填)</label>
        <input type="password" id="password" placeholder="留空则默认为 123123">
    </div>

    <button id="actionBtn" onclick="processFile()">开始处理</button>
    <div id="status"></div>
</div>

<script>
    // 密码推导：将字符串密码转化为加密密钥
    async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            "raw",
            enc.encode(password),
            "PBKDF2",
            false,
            ["deriveKey"]
        );
        return window.crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt: salt,
                iterations: 100000,
                hash: "SHA-256"
            },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    // 加密核心逻辑
    async function encryptData(dataBuffer, password) {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        
        const encrypted = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            dataBuffer
        );
        
        // 拼接：Salt(16字节) + IV(12字节) + 加密数据
        const result = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        result.set(salt, 0);
        result.set(iv, salt.length);
        result.set(new Uint8Array(encrypted), salt.length + iv.length);
        return result;
    }

    // 解密核心逻辑
    async function decryptData(dataBuffer, password) {
        const data = new Uint8Array(dataBuffer);
        const salt = data.slice(0, 16);
        const iv = data.slice(16, 28);
        const ciphertext = data.slice(28);
        
        const key = await deriveKey(password, salt);
        
        const decrypted = await window.crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            ciphertext
        );
        return decrypted;
    }

    // 触发文件下载
    function downloadFile(buffer, filename) {
        const blob = new Blob([buffer]);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // 显示状态信息
    function showStatus(text, type = 'info') {
        const statusEl = document.getElementById('status');
        statusEl.textContent = text;
        statusEl.className = type;
    }

    // 主处理流程
    async function processFile() {
        const fileInput = document.getElementById('fileInput');
        const mode = document.querySelector('input[name="mode"]:checked').value;
        let password = document.getElementById('password').value;
        const btn = document.getElementById('actionBtn');
        
        if (fileInput.files.length === 0) {
            showStatus('请先选择一个需要处理的文件！', 'error');
            return;
        }

        if (!password) password = "123123";

        const file = fileInput.files[0];
        btn.disabled = true;
        showStatus('正在拼命处理中，请稍候...', 'info');

        try {
            const arrayBuffer = await file.arrayBuffer();
            let resultBuffer;
            let outputFilename;

            if (mode === 'encrypt') {
                resultBuffer = await encryptData(arrayBuffer, password);
                outputFilename = file.name + '.enc';
            } else {
                resultBuffer = await decryptData(arrayBuffer, password);
                outputFilename = file.name.endsWith('.enc') ? file.name.slice(0, -4) : '解密_' + file.name;
            }

            downloadFile(resultBuffer, outputFilename);
            showStatus('处理成功！文件已开始下载。', 'success');
        } catch (error) {
            console.error(error);
            if (mode === 'decrypt') {
                showStatus('解密失败：密码错误或文件已损坏！', 'error');
            } else {
                showStatus('发生未知错误，请检查文件大小或浏览器兼容性。', 'error');
            }
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
